version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - gosec
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unused
    - errorlint
    - gocritic
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec
          - gocritic

formatters:
  enable:
    - gofmt
    - goimports
